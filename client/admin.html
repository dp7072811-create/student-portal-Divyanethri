<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="background-image:url('https://images.unsplash.com/photo-1551288049-bebda4e38f71');">

<!-- 🔐 LOGIN PROTECTION -->
<script>
if(localStorage.getItem("auth") !== "true") {
  alert("Please login first!");
  window.location.href = "login.html";
}
</script>

<!-- NAVBAR -->
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
<a href="admin.html">Admin</a>
<a href="login.html">Login</a>

</nav>

<div class="container">

<h1>Admin Panel</h1>

<!-- 🔓 LOGOUT -->
<button onclick="logout()">Logout</button>

<hr>

<!-- 📝 ADD DATA FORM -->
<h2>Add Student Details</h2>

<form id="adminForm">
<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="course" placeholder="Course">
<input type="text" id="phone" placeholder="Phone">
<textarea id="message" placeholder="Message"></textarea>

<button type="submit">Add Data</button>
</form>

<hr>

<!-- 🔍 SEARCH -->
<input type="text" id="search" placeholder="Search by name..." onkeyup="filterData()">

<br><br>

<!-- 📊 LOAD BUTTON -->
<button onclick="loadData()">Load Data</button>

<!-- 📦 DATA DISPLAY -->
<div id="data"></div>

</div>

<script>

let allData = [];

// 🔓 LOGOUT FUNCTION
function logout() {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
}

// ✅ ADD DATA
document.getElementById("adminForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const newData = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    course: document.getElementById("course").value,
    phone: document.getElementById("phone").value,
    message: document.getElementById("message").value
  };

  await fetch("http://localhost:5000/api/data", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(newData)
  });

  alert("✅ Data Added Successfully!");

  document.getElementById("adminForm").reset();
  loadData();
});

// ✅ LOAD DATA
async function loadData() {
  try {
    const res = await fetch("http://localhost:5000/api/data");
    const data = await res.json();

    allData = data;
    display(data);

  } catch (err) {
    alert("❌ Backend not connected!");
  }
}
<form id="form">
<input id="name" placeholder="Name" required>
<input id="email" placeholder="Email" required>
<textarea id="message"></textarea>
<button type="submit">Submit</button>
</form>
</div>


// ✅ DISPLAY DATA
function display(data) {
  if(data.length === 0) {
    document.getElementById("data").innerHTML = "<p>No data found</p>";
    return;
  }

  document.getElementById("data").innerHTML =
    data.map(item => `
      <div class="card">
        <h3>${item.name}</h3>
        <p><b>Email:</b> ${item.email}</p>
        <p><b>Course:</b> ${item.course || "-"}</p>
        <p><b>Phone:</b> ${item.phone || "-"}</p>
        <p><b>Message:</b> ${item.message || "-"}</p>
      </div>
    `).join("");
}

// ✅ SEARCH
function filterData() {
  const val = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(item =>
    item.name.toLowerCase().includes(val)
  );

  display(filtered);
}

// AUTO LOAD ON PAGE OPEN
loadData();

</script>

</body>
<script>
if(localStorage.getItem("auth") !== "true") {
  alert("Please login first!");
  window.location.href = "login.html";
}
</script>
</script>
</html>
